  name: Deploy pipe
  on:
    push:
      branches: [ "master", "main" ]
  jobs:
    job_one:
      name: "build and deploy"
      runs-on: ubuntu-latest
      steps:
        - name: "build and deploy"
          uses: appleboy/ssh-action@master
          with:
            host: world.of.ventures
            username: ubuntu
            key: ${{ secrets.VOW_GITHUB }}
            port: 22
            script: |
              cd ~/.github
              cd Website-API
              git pull
              echo "spring.profiles.active=dev" > src/main/resources/application.properties
              sudo ./gradlew clean build
              export tomcatApps="/var/lib/tomcat9/webapps"
              sudo rm -rf $tomcatApps/API/
              sudo rm $tomcatApps/API.war
              sleep 60
              sudo cp build/libs/API-plain.war $tomcatApps/API.war
              sudo service tomcat9 restart